<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — PersonalOCR Lite</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            text-align: center;
        }
        .error-container {
            max-width: 500px;
        }
        .error-code {
            font-size: 6rem;
            font-weight: 800;
            color: var(--accent);
            line-height: 1;
            margin-bottom: 1rem;
            opacity: 0.6;
        }
        .error-message {
            font-size: 1.2rem;
            color: var(--text-dim);
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .error-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 12px 28px;
            background: var(--accent);
            color: #000;
            font-weight: 700;
            border-radius: 8px;
            text-decoration: none;
            font-size: 1rem;
            transition: 0.2s;
        }
        .btn-home:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }
        .btn-retry {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 12px 28px;
            background: var(--panel);
            color: var(--text);
            font-weight: 600;
            border-radius: 8px;
            text-decoration: none;
            font-size: 1rem;
            border: 1px solid var(--border);
            transition: 0.2s;
        }
        .btn-retry:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        .status-indicator {
            display: inline-block;
            margin-top: 2rem;
            font-size: 0.85rem;
            color: var(--text-dim);
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <h1 style="font-size: 1.5rem; margin-bottom: 0.5rem;">Page Not Found</h1>
        <p class="error-message">
            The requested page could not be found.<br>
            If you were using PersonalOCR Lite, please return to the main dashboard.
        </p>
        <div class="error-actions">
            <a href="./" class="btn-home">← Return to Dashboard</a>
            <button class="btn-retry" onclick="location.reload()">⟳ Reload</button>
        </div>
        <div class="status-indicator">PersonalOCR Lite v4.0</div>
    </div>

    <script>
        // Attempt to redirect to the dashboard after a short delay
        // in case this was triggered by a Service Worker cache miss
        if ('serviceWorker' in navigator) {
            setTimeout(function() {
                window.location.href = './';
            }, 5000);
        }
    </script>
</body>
</html>
